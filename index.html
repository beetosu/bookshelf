<!DOCTYPE html>
<html>
<head>
    <title>Chloe's Bookshelf</title>
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/books.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/toggle-status.js"></script>
</head>
<body>
    <header>
        <h1>Chloe's Bookshelf :3</h1>
        <button onclick="toggleStatus()">Toggle Status</button>
        <div class="progress-bar">
            <div id="not-started">
                <p><b>X</b></p>
                <div class="bar"></div>
            </div>
            <div id="in-progress">
                <p><b>X</b></p>
                <div class="bar"></div>
            </div>
            <div id="completed">
                <p><b>X</b></p>
                <div class="bar"></div>
            </div>
        </div>
    </header>
    <main class="show-status">
        <img src="bookshelf.png" />
        <div class="shelves status">
            <div class="shelf one">
                <a id="woman-in-the-dunes" class="column-md"></a>
                <a id="hitchhikers-guide"></a>
                <a id="new-york-trilogy" class="column-md"></a>
                <a id="timbuktu" class="column-sm"></a>
                <a id="foundation" class="column-xxl"></a>
                <a id="beale-street" class="column-md"></a>
                <a id="happy-days" class="column-xs"></a>
                <a id="waiting-for-godot" class="column-md"></a>
                <a id="decameron" class="column-xl"></a>
                <a id="jane-eyre" class="column-lg"></a>
                <a id="clockwork-orange" class="column-md"></a>
                <a id="naked-lunch" class="column-md"></a>
                <a id="fall"></a>
                <a id="stranger" class="column-md"></a>
                <a id="in-cold-blood" class="column-md"></a>
                <a id="don-quixote" class="column-xl"></a>
                <a id="canterbury-tales" class="column-lg"></a>
                <a id="heart-of-darkness" class="column-md"></a>
                <a id="selected-poems" class="column-sm"></a>
                <a id="divine-comedy" class="column-lg"></a>
                <div class="stack">
                    <a id="house-of-leaves" class="row-lg"></a>
                    <a id="crime-and-punishment" class="row-lg"></a>
                    <a id="idiot" class="row-xl"></a>
                    <a id="sherlock-holmes" class="row-md"></a>
                    <a id="american-psycho" class="row-lg"></a>
                    <a id="sound-and-the-fury" class="row-md"></a>
                    <a id="great-gatsby" class="row-sm"></a>
                    <a id="gone-girl" class="row-lg"></a>
                </div>
                <a id="lesson-before-dying" class="column-md"></a>
                <a id="in-our-time" class="column-md"></a>
                <a id="sun-also-rises" class="column-lg"></a>
                <a id="catch-22" class="column-lg"></a>
            </div>
            <div class="shelf two">
            </div>
            <div class="shelf three">
            </div>
            <div class="shelf four">
            </div>
            <div class="shelf five">
            </div>
        </div>
    </main>
    <script type="module" src="/index.js" defer></script>
</body>
</html>
